<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Vibe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; overflow: hidden; }
    #app { height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    #header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    #header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    #header h1 span { color: #a78bfa; }

    /* Vibe rows — horizontal scroll */
    #vibe-feed { flex: 1; overflow-y: auto; padding: 8px 0; }
    .vibe-row { margin-bottom: 20px; }
    .vibe-row-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
                      letter-spacing: 0.08em; color: #888; padding: 0 16px 8px; }
    .vibe-row-strip { display: flex; gap: 8px; padding: 0 16px; overflow-x: auto;
                      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .vibe-row-strip::-webkit-scrollbar { display: none; }

    /* Stream card */
    .stream-card { flex: 0 0 160px; height: 220px; border-radius: 12px; overflow: hidden;
                   position: relative; scroll-snap-align: start; cursor: pointer;
                   background: #1a1a1a; }
    .stream-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .stream-card-meta { position: absolute; bottom: 0; left: 0; right: 0;
                        padding: 8px 10px; background: linear-gradient(transparent, rgba(0,0,0,0.8));
                        font-size: 0.7rem; }
    .stream-card-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stream-card-viewers { color: #a78bfa; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center;
               height: 100%; color: #555; font-size: 0.9rem; }

    /* Error */
    .error-msg { color: #f87171; padding: 16px; font-size: 0.85rem; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>vi<span>be</span></h1>
    <span id="status" style="font-size:0.7rem;color:#555;">loading...</span>
  </div>
  <div id="vibe-feed">
    <div class="loading">loading vibes...</div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_BASE    = "https://identifier-stocks-answer-adaptation.trycloudflare.com"; // CF tunnel
const API_KEY     = "";   // set before use
const SC_API      = "https://go.stripchat.com/api/models";

// ── STATE ─────────────────────────────────────────────────────────────────────
let vibes    = [];
let scModels = {};  // username -> model data from Stripchat

// ── API HELPERS ───────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(API_BASE + path, { headers: { "X-API-Key": API_KEY } });
  if (!r.ok) throw new Error(`API ${r.status}: ${path}`);
  return r.json();
}

async function fetchStripchatModels(usernames) {
  // Stripchat doesn't support multi-username lookup — fetch top models and match
  const r = await fetch(`${SC_API}?limit=200&sortBy=viewersCount`);
  if (!r.ok) return;
  const data = await r.json();
  const models = (data.models || []).filter(m => m.status === "public");
  models.forEach(m => { scModels[m.username] = m; });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderCard(username) {
  const m = scModels[username] || {};
  const snap = m.snapshotUrl || "";
  const viewers = m.viewersCount || "";
  const card = document.createElement("div");
  card.className = "stream-card";
  card.innerHTML = `
    ${snap ? `<img src="${snap}" loading="lazy" alt="${username}">` : ""}
    <div class="stream-card-meta">
      <div class="stream-card-name">${username}</div>
      ${viewers ? `<div class="stream-card-viewers">👁 ${viewers}</div>` : ""}
    </div>
  `;
  card.addEventListener("click", () => {
    const url = m.pageUrl || `https://stripchat.com/${username}`;
    window.open(url, "_blank");
  });
  return card;
}

function renderVibeRow(vibe) {
  const row = document.createElement("div");
  row.className = "vibe-row";
  row.innerHTML = `<div class="vibe-row-label">${vibe.name} <span style="color:#444">${vibe.model_count}</span></div>`;
  const strip = document.createElement("div");
  strip.className = "vibe-row-strip";
  (vibe.sample_usernames || []).forEach(u => strip.appendChild(renderCard(u)));
  row.appendChild(strip);
  return row;
}

async function loadMore(vibeId, strip, offset) {
  try {
    const data = await apiFetch(`/vibes/${vibeId}/models?limit=20&offset=${offset}`);
    data.models.forEach(m => strip.appendChild(renderCard(m.username)));
  } catch(e) { console.warn("loadMore failed", e); }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const feed   = document.getElementById("vibe-feed");
  const status = document.getElementById("status");

  try {
    // Load vibes + first batch of Stripchat data in parallel
    const vibesData = await apiFetch("/vibes");
    vibes = vibesData.vibes || [];

    // Collect all sample usernames for Stripchat pre-fetch
    const allUsernames = vibes.flatMap(v => v.sample_usernames || []);
    await fetchStripchatModels(allUsernames);

    feed.innerHTML = "";
    vibes.forEach(v => feed.appendChild(renderVibeRow(v)));
    status.textContent = `${vibes.length} vibes`;
  } catch(e) {
    feed.innerHTML = `<div class="error-msg">Error: ${e.message}<br>Check API_KEY and API_BASE config.</div>`;
    status.textContent = "error";
  }
}

init();
</script>
</body>
</html>
